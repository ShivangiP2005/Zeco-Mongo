<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — ZECO</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">zeco</div>
    <h2>Create account</h2>
    <p class="subtitle">Sign up to start ordering</p>

    <form id="signupForm">
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your name" required/>
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="input-group">
        <label>Phone</label>
        <input type="tel" id="phone" placeholder="10-digit number"/>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" required minlength="6"/>
      </div>
      <button type="submit" class="submit-btn">Sign Up</button>
      <div id="msgBox"></div>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  const msgBox = document.getElementById('msgBox');
  msgBox.innerHTML = '';

  // Frontend validation — instant feedback before hitting the server
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const strongPassword = /^(?=.*[A-Za-z])(?=.*\d).{6,}$/;

  const nameRegex = /^[A-Za-z\s]{2,50}$/;
  if (!nameRegex.test(name)) {
    msgBox.innerHTML = '<div class="msg error">Name should only contain letters and spaces (2-50 characters)</div>';
    return;
  }
  
  if (!emailRegex.test(email)) {
    msgBox.innerHTML = '<div class="msg error">Please enter a valid email address</div>';
    return;
  }
  if (phone && !/^[6-9]\d{9}$/.test(phone)) {
    msgBox.innerHTML = '<div class="msg error">Enter a valid 10-digit Indian phone number</div>';
    return;
  }
  if (!strongPassword.test(password)) {
    msgBox.innerHTML = '<div class="msg error">Password needs 6+ characters with at least one letter and one number</div>';
    return;
  }

  const btn = e.target.querySelector('.submit-btn');
  btn.textContent = 'Creating account...';
  btn.disabled = true;

  try {
    const res = await api.register({ name, email, phone, password });

    if (res.token) {
      localStorage.setItem('token', res.token);
      localStorage.setItem('userName', res.user.name);
      localStorage.setItem('userRole', res.user.role);
      msgBox.innerHTML = '<div class="msg success">Account created! Redirecting...</div>';
      setTimeout(() => window.location.href = 'index.html', 800);
    } else {
      msgBox.innerHTML = `<div class="msg error">${res.error || 'Signup failed'}</div>`;
      btn.textContent = 'Sign Up';
      btn.disabled = false;
    }
  } catch (err) {
    msgBox.innerHTML = '<div class="msg error">Something went wrong. Check if backend is running.</div>';
    btn.textContent = 'Sign Up';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
