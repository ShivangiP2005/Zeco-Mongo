<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — ZECO</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">zeco</a>
  <div class="delivery-info">
    <div class="deliver-text">Deliver to</div>
    <div class="location-row">
      <span class="location-name">📍 Select Location</span>
      <span class="arrow">▾</span>
    </div>
  </div>
  <div style="flex:1"></div>
  <div class="nav-actions">
    <div class="account-wrap">
      <button class="btn-login" id="authBtn" onclick="toggleAccountMenu()">
        👤 <span id="authLabel">Login</span>
      </button>
      <div class="account-dropdown" id="accountDropdown">
        <a href="orders.html">📦 My Orders</a>
        <a href="admin.html" id="adminLink" style="display:none">⚙️ Admin Dashboard</a>
        <div class="divider"></div>
        <button class="logout-item" onclick="handleAuthBtn()">🚪 Logout</button>
      </div>
    </div>
    <button class="btn-cart" onclick="window.location.href='cart.html'">
      🛒 Cart
      <span class="cart-badge" id="cartCount">0</span>
    </button>
  </div>
</nav>

<div class="page-wrap" id="productDetail"></div>

<div class="page-wrap" style="margin-top:0">
  <h2 class="page-title" style="font-size:18px">Ratings & Reviews</h2>
  <div id="reviewSummary"></div>
  <div id="reviewForm"></div>
  <div id="reviewsList"></div>
</div>

<script src="js/api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
let currentProduct = null;
let cart = JSON.parse(localStorage.getItem('zecoCart') || '[]');

function saveCart() {
  localStorage.setItem('zecoCart', JSON.stringify(cart));
  updateCartCount();
}
function updateCartCount() {
  const total = cart.reduce((s, i) => s + i.quantity, 0);
  document.getElementById('cartCount').textContent = total;
}
function getQty(id) {
  return (cart.find(i => i.productId === id) || {}).quantity || 0;
}
function addToCart(p) {
  if (!localStorage.getItem('token')) {
    alert('Please login to add items to cart');
    window.location.href = 'login.html';
    return;
  }
  const ex = cart.find(i => i.productId === p._id);
  if (ex) ex.quantity++;
  else cart.push({ productId: p._id, name: p.name, image: p.image, price: p.price, quantity: 1 });
  saveCart();
  renderProduct();
}
function changeQty(id, d) {
  const item = cart.find(i => i.productId === id);
  if (!item) return;
  item.quantity += d;
  if (item.quantity <= 0) cart = cart.filter(i => i.productId !== id);
  saveCart();
  renderProduct();
}
function handleAuthBtn() {
  if (localStorage.getItem('token')) {
    if (confirm('Logout from ZECO?')) { localStorage.clear(); window.location.href = 'index.html'; }
  } else {
    window.location.href = 'login.html';
  }
}

function toggleAccountMenu() {
  if (!localStorage.getItem('token')) { window.location.href = 'login.html'; return; }
  document.getElementById('accountDropdown').classList.toggle('open');
}
document.addEventListener('click', (e) => {
  const wrap = document.querySelector('.account-wrap');
  if (wrap && !wrap.contains(e.target)) document.getElementById('accountDropdown')?.classList.remove('open');
});

function renderStars(rating, size = 16) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    html += `<span style="color:${i <= Math.round(rating) ? '#f8c200' : '#ddd'}; font-size:${size}px">★</span>`;
  }
  return html;
}

async function renderProduct() {
  if (!productId) {
    document.getElementById('productDetail').innerHTML = '<p class="empty-state">No product selected</p>';
    return;
  }
  currentProduct = await api.getProducts(`?search=`).then(() => null); // placeholder, real fetch below
  const res = await fetch(`http://localhost:5000/api/products/${productId}`).then(r => r.json());
  currentProduct = res;

  const qty = getQty(currentProduct._id);
  const disc = currentProduct.mrp ? Math.round(((currentProduct.mrp - currentProduct.price) / currentProduct.mrp) * 100) : 0;

  document.getElementById('productDetail').innerHTML = `
    <div style="display:flex; gap:32px; flex-wrap:wrap;">
      <div style="width:280px; height:280px; background:#f8f9fa; border-radius:16px; overflow:hidden; flex-shrink:0;">
        <img src="${currentProduct.image}" alt="${currentProduct.name}" style="width:100%; height:100%; object-fit:cover"
          onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?w=400'"/>
      </div>
      <div style="flex:1; min-width:260px;">
        <p style="font-size:13px; color:#888; font-weight:600;">${currentProduct.brand || ''}</p>
        <h1 style="font-size:24px; font-weight:800; margin:6px 0;">${currentProduct.name}</h1>
        <p style="font-size:14px; color:#888; margin-bottom:12px;">${currentProduct.unit || ''}</p>
        <div id="ratingBadge"></div>
        <div style="display:flex; align-items:center; gap:10px; margin:16px 0;">
          <span style="font-size:26px; font-weight:800;">₹${currentProduct.price}</span>
          ${currentProduct.mrp ? `<span style="font-size:16px; color:#aaa; text-decoration:line-through;">₹${currentProduct.mrp}</span>` : ''}
          ${disc > 0 ? `<span style="background:#e8f5e9; color:#0c831f; padding:3px 10px; border-radius:6px; font-size:13px; font-weight:700;">${disc}% OFF</span>` : ''}
        </div>
        ${qty === 0
          ? `<button class="add-btn" style="width:160px" onclick='addToCart(${JSON.stringify(currentProduct).replace(/'/g,"&#39;")})'>+ Add to Cart</button>`
          : `<div class="qty-control" style="width:160px">
              <button onclick="changeQty('${currentProduct._id}',-1)">−</button>
              <span>${qty}</span>
              <button onclick="changeQty('${currentProduct._id}',1)">+</button>
             </div>`
        }
      </div>
    </div>
  `;

  loadReviews();
}

async function loadReviews() {
  const data = await fetch(`http://localhost:5000/api/reviews/${productId}`).then(r => r.json());

  document.getElementById('ratingBadge').innerHTML = data.count > 0
    ? `<div style="display:flex; align-items:center; gap:8px;">${renderStars(data.avgRating)} <span style="font-size:14px; color:#666;">${data.avgRating} (${data.count} review${data.count > 1 ? 's' : ''})</span></div>`
    : `<p style="font-size:13px; color:#999;">No reviews yet — be the first!</p>`;

  document.getElementById('reviewSummary').innerHTML = '';

  document.getElementById('reviewForm').innerHTML = localStorage.getItem('token')
    ? `
      <div style="background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:18px; margin:16px 0;">
        <p style="font-weight:700; font-size:14px; margin-bottom:10px;">Write a review</p>
        <div id="starInput" style="font-size:24px; cursor:pointer; margin-bottom:10px;">
          ${[1,2,3,4,5].map(i => `<span data-star="${i}" onclick="setStar(${i})" style="color:#ddd">★</span>`).join('')}
        </div>
        <textarea id="reviewComment" class="address-input" rows="2" placeholder="Share your experience (optional)"></textarea>
        <button class="submit-btn" style="width:160px; margin-top:8px;" onclick="submitReview()">Submit Review</button>
        <div id="reviewMsg"></div>
      </div>`
    : `<p style="font-size:13px; color:#999; margin:12px 0;"><a href="login.html" style="color:#7b2ff7; font-weight:600;">Login</a> to write a review</p>`;

  document.getElementById('reviewsList').innerHTML = data.reviews.length
    ? data.reviews.map(r => `
        <div style="border-bottom:1px solid #eee; padding:14px 0;">
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
            <span style="font-weight:700; font-size:14px;">${r.userName}</span>
            <span>${renderStars(r.rating, 13)}</span>
          </div>
          ${r.comment ? `<p style="font-size:14px; color:#444;">${r.comment}</p>` : ''}
          <p style="font-size:12px; color:#aaa; margin-top:2px;">${new Date(r.createdAt).toLocaleDateString('en-IN')}</p>
        </div>`).join('')
    : '';
}

let selectedStar = 0;
function setStar(n) {
  selectedStar = n;
  document.querySelectorAll('#starInput span').forEach(s => {
    s.style.color = Number(s.dataset.star) <= n ? '#f8c200' : '#ddd';
  });
}

async function submitReview() {
  const msgBox = document.getElementById('reviewMsg');
  if (selectedStar === 0) {
    msgBox.innerHTML = '<div class="msg error">Please select a star rating</div>';
    return;
  }
  const comment = document.getElementById('reviewComment').value.trim();

  try {
    const res = await fetch(`http://localhost:5000/api/reviews/${productId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${localStorage.getItem('token')}` },
      body: JSON.stringify({ rating: selectedStar, comment })
    }).then(r => r.json());

    if (res._id) {
      msgBox.innerHTML = '<div class="msg success">Review submitted!</div>';
      selectedStar = 0;
      setTimeout(loadReviews, 800);
    } else {
      msgBox.innerHTML = `<div class="msg error">${res.error || 'Failed to submit'}</div>`;
    }
  } catch (err) {
    msgBox.innerHTML = '<div class="msg error">Something went wrong</div>';
  }
}

const token = localStorage.getItem('token');
const name = localStorage.getItem('userName');
if (token) {
  document.getElementById('authLabel').textContent = name || 'Account';
  if (localStorage.getItem('userRole') === 'admin') document.getElementById('adminLink').style.display = 'block';
}
updateCartCount();
renderProduct();
</script>
</body>
</html>
