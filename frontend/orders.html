<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Orders — ZECO</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">zeco</a>
  <div class="delivery-info">
    <div class="deliver-text">Deliver to</div>
    <div class="location-row">
      <span class="location-name">📍 Select Location</span>
      <span class="arrow">▾</span>
    </div>
  </div>
  <div style="flex:1"></div>
  <div class="nav-actions">
    <div class="account-wrap">
      <button class="btn-login" id="authBtn" onclick="toggleAccountMenu()">
        👤 <span id="authLabel">Login</span>
      </button>
      <div class="account-dropdown" id="accountDropdown">
        <a href="orders.html">📦 My Orders</a>
        <a href="admin.html" id="adminLink" style="display:none">⚙️ Admin Dashboard</a>
        <div class="divider"></div>
        <button class="logout-item" onclick="handleAuthBtn()">🚪 Logout</button>
      </div>
    </div>
    <button class="btn-cart" onclick="window.location.href='cart.html'">
      🛒 Cart
      <span class="cart-badge" id="cartCount">0</span>
    </button>
  </div>
</nav>

<div id="confirmationBanner"></div>

<div class="page-wrap">
  <h1 class="page-title">Your Orders</h1>
  <div id="ordersList"></div>
</div>

<script src="js/api.js"></script>
<script>
const statusClass = {
  'Order Placed': 's-placed',
  'Confirmed': 's-confirmed',
  'Packed': 's-packed',
  'Out for Delivery': 's-out',
  'Delivered': 's-delivered',
  'Cancelled': 's-cancelled'
};

function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem('zecoCart') || '[]');
  const total = cart.reduce((s, i) => s + i.quantity, 0);
  document.getElementById('cartCount').textContent = total;
}

function handleAuthBtn() {
  if (localStorage.getItem('token')) {
    if (confirm('Logout from ZECO?')) {
      localStorage.clear();
      window.location.href = 'index.html';
    }
  } else {
    window.location.href = 'login.html';
  }
}

function toggleAccountMenu() {
  if (!localStorage.getItem('token')) { window.location.href = 'login.html'; return; }
  document.getElementById('accountDropdown').classList.toggle('open');
}
document.addEventListener('click', (e) => {
  const wrap = document.querySelector('.account-wrap');
  if (wrap && !wrap.contains(e.target)) document.getElementById('accountDropdown')?.classList.remove('open');
});

function showConfirmationIfJustOrdered() {
  if (sessionStorage.getItem('justOrdered') === 'true') {
    sessionStorage.removeItem('justOrdered');
    document.getElementById('confirmationBanner').innerHTML = `
      <div style="background:linear-gradient(135deg,#0c831f,#22c55e); color:white; text-align:center; padding:28px 20px; animation: slideDown 0.4s ease;">
        <div style="font-size:44px; margin-bottom:8px;">✅</div>
        <div style="font-size:20px; font-weight:800;">Order Placed Successfully!</div>
        <div style="font-size:14px; opacity:0.9; margin-top:4px;">We're preparing your order. Arriving in ~10 minutes.</div>
      </div>
      <style>
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      </style>
    `;
  }
}

function timeAgo(dateStr) {
  const date = new Date(dateStr);
  return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function renderTimeline(status) {
  const steps = ['Order Placed', 'Confirmed', 'Packed', 'Out for Delivery', 'Delivered'];

  if (status === 'Cancelled') {
    return `<div style="font-size:13px; color:#c62828; font-weight:600; margin:12px 0 4px;">✕ This order was cancelled</div>`;
  }

  const currentIndex = steps.indexOf(status);

  return `<div class="status-timeline">
    ${steps.map((step, i) => `
      <div class="timeline-step">
        <div class="timeline-dot ${i <= currentIndex ? 'done' : ''}">${i <= currentIndex ? '✓' : ''}</div>
        <div class="timeline-line ${i < currentIndex ? 'done' : ''}"></div>
        <div class="timeline-label">${step}</div>
      </div>
    `).join('')}
  </div>`;
}

async function cancelOrder(orderId) {
  if (!confirm('Cancel this order? This cannot be undone.')) return;
  try {
    const res = await api.cancelOrder(orderId);
    if (res.order) {
      loadOrders();
    } else {
      alert(res.error || 'Could not cancel order');
    }
  } catch (err) {
    alert('Something went wrong');
  }
}

async function loadOrders() {
  const list = document.getElementById('ordersList');
list.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><p>Loading your orders...</p></div>`;
  if (!localStorage.getItem('token')) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔒</div>
        <h3>Please login to view orders</h3>
        <button class="purple-btn" onclick="window.location.href='login.html'">Login</button>
      </div>`;
    return;
  }

  try {
    const orders = await api.getOrders();

    if (!orders.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📦</div>
          <h3>No orders yet</h3>
          <p>Your order history will show up here</p>
          <button class="purple-btn" onclick="window.location.href='index.html'">Start Shopping</button>
        </div>`;
      return;
    }

   list.innerHTML = orders.map(order => `
      <div class="order-card">
        <div class="order-top">
          <div>
            <div class="order-id">Order #${order._id.slice(-8).toUpperCase()}</div>
            <div class="order-date">${timeAgo(order.createdAt)}</div>
          </div>
          <span class="status-pill ${statusClass[order.status] || 's-placed'}">${order.status}</span>
        </div>
        ${renderTimeline(order.status)}
        <div class="order-items">
          ${order.items.map(i => `<div class="order-item-chip">${i.name} × ${i.quantity}</div>`).join('')}
        </div>
        <div class="order-footer">
          <span style="font-size:13px;color:#6b7280">${order.paymentMethod}</span>
          <span class="order-total">₹${order.totalPrice}</span>
        </div>
        ${!['Packed','Out for Delivery','Delivered','Cancelled'].includes(order.status)
          ? `<div style="margin-top:12px; text-align:right;"><button class="cancel-order-btn" onclick="cancelOrder('${order._id}')">Cancel Order</button></div>`
          : ''
        }
      </div>
    `).join('');
  } catch (err) {
    list.innerHTML = `
      <div class="error-state">
        <div class="error-icon">⚠️</div>
        <h3>Couldn't load your orders</h3>
        <p>Check if the backend server is running, then try again</p>
        <button class="retry-btn" onclick="loadOrders()">Retry</button>
      </div>`;
  }
}

const token = localStorage.getItem('token');
const name = localStorage.getItem('userName');
if (token) {
  document.getElementById('authLabel').textContent = name || 'Account';
  if (localStorage.getItem('userRole') === 'admin') document.getElementById('adminLink').style.display = 'block';
}
updateCartCount();
showConfirmationIfJustOrdered();
loadOrders();
</script>
</body>
</html>
