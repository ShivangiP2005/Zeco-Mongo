<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ZECO</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">zeco</div>
    <h2>Welcome back</h2>
    <p class="subtitle">Login to continue shopping</p>

    <form id="loginForm">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="submit-btn">Login</button>
      <div id="msgBox"></div>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const msgBox = document.getElementById('msgBox');
  msgBox.innerHTML = '';

  const btn = e.target.querySelector('.submit-btn');
  btn.textContent = 'Logging in...';
  btn.disabled = true;

  try {
    const res = await api.login({ email, password });

    if (res.token) {
      localStorage.setItem('token', res.token);
      localStorage.setItem('userName', res.user.name);
      localStorage.setItem('userRole', res.user.role);
      msgBox.innerHTML = '<div class="msg success">Login successful! Redirecting...</div>';
      setTimeout(() => {
        window.location.href = res.user.role === 'admin' ? 'admin.html' : 'index.html';
      }, 800);
    } else {
      msgBox.innerHTML = `<div class="msg error">${res.error || 'Login failed'}</div>`;
      btn.textContent = 'Login';
      btn.disabled = false;
    }
  } catch (err) {
    msgBox.innerHTML = '<div class="msg error">Something went wrong. Check if backend is running.</div>';
    btn.textContent = 'Login';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
